name: lint

# The parity lint is the repo's source-of-truth gate (SKILLS + MCPS identical
# across all four installers, PLUGINS claude-only, HTML in sync, references
# resolve, README counts match). Run it on every push and PR so drift can never
# land silently.
#
# The root package-lock.json is deliberately NOT committed (only examples/ pin a
# lockfile), so this job runs lock-free: no setup-node `cache: npm` and no
# `npm ci` - both require a committed lockfile and fail without one. `npm install`
# resolves the single lint dep (js-yaml) fresh each run.
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm run lint
