name: release

# Rebuild the rolling 'latest' release on every push to main: one tar.gz + one zip source
# snapshot per revision, with a RELEASE-SOURCE file inside naming the exact commit. The
# installers (claude-stack.sh / .ps1) and the setup/configure plugin skills download this
# instead of cloning; a shallow git clone is their fallback when no release is reachable
# (which includes the brief delete/recreate window this job opens).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the source archives
        run: |
          printf 'sha: %s\nref: main\nbuilt: %s\n' "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > RELEASE-SOURCE
          git archive --format=tar.gz --add-file=RELEASE-SOURCE -o claude-stack.tar.gz HEAD
          git archive --format=zip    --add-file=RELEASE-SOURCE -o claude-stack.zip    HEAD

      - name: Recreate the rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest claude-stack.tar.gz claude-stack.zip \
            --latest --title 'claude-stack (rolling)' \
            --notes "Source snapshot of main @ ${GITHUB_SHA} - consumed by the stack installers and the setup/configure plugin skills. RELEASE-SOURCE inside each archive names this commit; not meant for manual download."
